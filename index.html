<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Penjualan Blok Lebu Lama - Supabase Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            z-index: 200;
            backdrop-filter: blur(2px);
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <!-- Loading Indicator -->
    <div id="loader" class="loading-overlay">
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-2 text-xs font-bold text-blue-700 animate-pulse">Sinkronisasi Data...</p>
        </div>
    </div>

    <!-- Screen Login -->
    <div id="loginScreen" class="fixed inset-0 bg-blue-700 flex items-center justify-center z-[100] px-4">
        <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-black text-blue-700 italic">BLOK LEBU LAMA RT 14</h1>
                <p class="text-slate-500 text-sm mt-1 uppercase tracking-widest font-bold">Cloud Database Access</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Username</label>
                    <input type="text" id="username" required class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-base">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Kata Sandi</label>
                    <div class="relative">
                        <input type="password" id="password" required class="w-full p-4 pr-12 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-base">
                        <button type="button" onclick="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition-colors">
                            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 active:scale-[0.98] transition-all shadow-lg text-base uppercase">Masuk</button>
            </form>
            <p id="loginError" class="text-red-500 text-xs text-center mt-4 hidden font-medium italic">Username atau kata sandi salah!</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="appContent" class="hidden">
        <header class="bg-blue-700 text-white py-6 px-4 shadow-lg mb-6 sm:mb-8 text-center relative sticky top-0 z-40">
            <h1 class="text-xl sm:text-2xl font-bold italic">BLOK LEBU LAMA RT 14</h1>
            <div class="flex items-center justify-center gap-2 mt-1">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                <p class="text-blue-100 uppercase tracking-widest text-[9px] sm:text-[10px]">Cloud Synced Dashboard</p>
            </div>
            <button onclick="logout()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-blue-800 p-2 rounded-lg hover:bg-red-600 active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </header>

        <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-6 sm:gap-8">
            <!-- Form Section -->
            <section class="lg:col-span-5 space-y-6">
                <div class="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-6 text-slate-800 flex items-center">
                        <span id="formIcon" class="bg-blue-100 text-blue-700 p-2 rounded-lg mr-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                        </span>
                        <span id="formTitle">Formulir Pemesanan</span>
                    </h2>

                    <form id="salesForm" class="space-y-4">
                        <input type="hidden" id="editId" value="">
                        
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nama Pembeli</label>
                            <input type="text" id="buyerName" required placeholder="Masukkan nama" class="w-full p-3.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-base">
                        </div>

                        <!-- BARU: Alamat dan Handphone -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nomor Handphone (WA)</label>
                                <input type="tel" id="phoneNumber" placeholder="08xxx" class="w-full p-3.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-base">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Alamat Singkat</label>
                                <input type="text" id="address" placeholder="Contoh: No. 12" class="w-full p-3.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-base">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Kategori</label>
                                <select id="category" class="w-full p-3.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none bg-white text-base">
                                    <option value="dewasa">Dewasa (Rp 100k)</option>
                                    <option value="anak">Anak (Rp 80k)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Metode Bayar</label>
                                <select id="paymentStatus" class="w-full p-3.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none bg-white text-base">
                                    <option value="lunas">Lunas (Kontan)</option>
                                    <option value="cicilan">Cicilan</option>
                                </select>
                            </div>
                        </div>

                        <div id="installmentInput" class="hidden p-4 bg-orange-50 border border-orange-100 rounded-xl space-y-2">
                            <label class="block text-xs font-bold text-orange-800 uppercase">Pembayaran Awal (DP)</label>
                            <input type="number" id="downPayment" placeholder="0" class="w-full p-3 rounded-lg border border-orange-200 outline-none focus:ring-2 focus:ring-orange-500 text-base">
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Ukuran</label>
                            <div id="sizeContainer" class="grid grid-cols-3 sm:grid-cols-5 gap-2"></div>
                        </div>

                        <div class="flex items-center p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300 cursor-pointer" onclick="document.getElementById('longSleeve').click()">
                            <input type="checkbox" id="longSleeve" class="w-5 h-5 text-blue-600 rounded" onclick="event.stopPropagation()">
                            <label for="longSleeve" class="ml-3 text-sm font-medium text-slate-700">Lengan Panjang (+ Rp 10k)</label>
                        </div>

                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <div class="flex justify-between items-center">
                                <span class="text-xs text-blue-700 font-bold uppercase">Total Harga:</span>
                                <span id="pricePreview" class="text-xl font-black text-blue-800">Rp 0</span>
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                            SIMPAN PESANAN
                        </button>
                        <button type="button" id="cancelEditBtn" onclick="resetForm()" class="hidden w-full bg-slate-200 text-slate-600 font-bold py-3 rounded-xl mt-2 uppercase text-xs">
                            Batal Edit
                        </button>
                    </form>
                </div>
            </section>

            <!-- List Section -->
            <section class="lg:col-span-7 space-y-6">
                <div class="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full min-h-[500px]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-slate-800">Daftar Penjualan</h2>
                        <button onclick="fetchData()" class="p-2 text-slate-400 hover:text-blue-600 transition-colors" title="Refresh">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                        </button>
                    </div>

                    <div id="salesList" class="grid grid-cols-1 gap-4 overflow-y-auto pr-1 custom-scrollbar flex-grow" style="max-height: 70vh;">
                        <!-- Data will be rendered here -->
                    </div>

                    <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4 pt-6 border-t border-slate-100">
                        <div class="p-4 bg-green-50 rounded-2xl border border-green-100">
                            <p class="text-[10px] text-green-700 font-bold uppercase mb-1">Terkumpul</p>
                            <p id="totalCollected" class="text-xl font-black text-green-600">Rp 0</p>
                        </div>
                        <div class="p-4 bg-orange-50 rounded-2xl border border-orange-100">
                            <p class="text-[10px] text-orange-700 font-bold uppercase mb-1">Piutang</p>
                            <p id="totalReceivable" class="text-xl font-black text-orange-600">Rp 0</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Bayar -->
    <div id="paymentModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[110] backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl">
            <h3 class="text-lg font-bold text-slate-800 mb-4 font-bold">Input Pembayaran</h3>
            <div id="modalContent" class="space-y-4">
                <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                    <p id="modalName" class="font-bold text-blue-700"></p>
                    <p id="modalSisa" class="text-xs text-slate-500 font-bold mt-1"></p>
                </div>
                <input type="number" id="payAmount" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-lg" placeholder="Jumlah Bayar">
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 font-bold rounded-xl uppercase text-xs">Batal</button>
                    <button onclick="savePayment()" class="flex-1 py-4 bg-blue-600 text-white font-bold rounded-xl uppercase text-xs shadow-lg">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * 1. KONFIGURASI SUPABASE
         */
        const SUPABASE_URL = "https://nfcvdnjhsogdlqujwohq.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_d-NMBtZWElF3S8qKKpQJOw_Zsmxc2te"; 
        
        let supabaseClient;

        try {
            if (SUPABASE_URL && SUPABASE_KEY) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch(e) {
            console.error("Supabase config error", e);
        }

        const USERS = {
            "RT14": { pass: "Lebulama", role: "admin" },
            "Lebulama": { pass: "123456", role: "pembeli" }
        };

        let currentUser = JSON.parse(localStorage.getItem('blok_lebu_user')) || null;
        let localData = []; 
        let activeId = null;

        function toggleLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }

        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('password');
            const eyeOpen = document.getElementById('eyeOpen');
            const eyeClosed = document.getElementById('eyeClosed');
            pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
            eyeOpen.classList.toggle('hidden');
            eyeClosed.classList.toggle('hidden');
        }

        async function fetchData() {
            if (!supabaseClient) {
                localData = JSON.parse(localStorage.getItem('offline_sales')) || [];
                renderData(localData);
                return;
            }

            toggleLoader(true);
            const { data, error } = await supabaseClient.from('sales').select('*').order('created_at', { ascending: false });
            toggleLoader(false);

            if (error) {
                console.error(error);
                alert("Gagal sinkronisasi data!");
                return;
            }
            renderData(data);
        }

        async function saveData(payload) {
            toggleLoader(true);
            let response;
            if (payload.id) {
                response = await supabaseClient.from('sales').update(payload).eq('id', payload.id);
            } else {
                response = await supabaseClient.from('sales').insert([payload]);
            }
            toggleLoader(false);
            if (response.error) alert("Gagal menyimpan ke cloud!");
            fetchData();
        }

        async function deleteData(id) {
            if (!confirm("Hapus data ini?")) return;
            toggleLoader(true);
            const { error } = await supabaseClient.from('sales').delete().eq('id', id);
            toggleLoader(false);
            if (error) alert("Gagal menghapus!");
            fetchData();
        }

        function initApp() {
            if (!currentUser) {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('appContent').classList.add('hidden');
            } else {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                renderSizes();
                fetchData();
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (USERS[u] && USERS[u].pass === p) {
                currentUser = { username: u, role: USERS[u].role };
                localStorage.setItem('blok_lebu_user', JSON.stringify(currentUser));
                initApp();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        });

        function logout() {
            localStorage.removeItem('blok_lebu_user');
            location.reload();
        }

        const SIZES = { dewasa: ['S', 'M', 'L', 'XL', 'XXL'], anak: ['S Anak', 'M Anak', 'L Anak', 'XL Anak'] };
        const PRICES = { dewasa: 100000, anak: 80000, extra: 10000 };

        function renderSizes(selected = null) {
            const cat = document.getElementById('category').value;
            const container = document.getElementById('sizeContainer');
            container.innerHTML = '';
            SIZES[cat].forEach((s, i) => {
                const isChecked = selected ? s === selected : i === 0;
                container.innerHTML += `
                    <div class="relative">
                        <input type="radio" name="size" id="s_${i}" value="${s}" ${isChecked ? 'checked' : ''} class="hidden peer" onchange="updatePreview()">
                        <label for="s_${i}" class="flex items-center justify-center h-12 text-[10px] font-bold border border-slate-200 rounded-xl cursor-pointer peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 uppercase transition-all">${s}</label>
                    </div>
                `;
            });
            updatePreview();
        }

        function updatePreview() {
            const cat = document.getElementById('category').value;
            const size = document.querySelector('input[name="size"]:checked')?.value;
            const isLong = document.getElementById('longSleeve').checked;
            let total = PRICES[cat];
            if (size === 'XXL') total += PRICES.extra;
            if (isLong) total += PRICES.extra;
            document.getElementById('pricePreview').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            return total;
        }

        document.getElementById('salesForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const price = updatePreview();
            const dp = parseInt(document.getElementById('downPayment').value) || 0;
            const editId = document.getElementById('editId').value;

            const payload = {
                name: document.getElementById('buyerName').value,
                phone: document.getElementById('phoneNumber').value, // Baru
                address: document.getElementById('address').value, // Baru
                category: document.getElementById('category').value,
                size: document.querySelector('input[name="size"]:checked').value,
                is_long: document.getElementById('longSleeve').checked,
                price: price
            };

            if (editId) {
                payload.id = editId;
            } else {
                payload.payments = document.getElementById('paymentStatus').value === 'lunas' 
                    ? [{ amount: price, date: new Date().toISOString() }] 
                    : (dp > 0 ? [{ amount: dp, date: new Date().toISOString() }] : []);
            }

            if (!supabaseClient){
                if (editId) {
                    const idx = localData.findIndex(d => d.id == editId);
                    localData[idx] = {...localData[idx], ...payload};
                } else {
                    payload.id = Date.now();
                    localData.push(payload);
                }
                localStorage.setItem('offline_sales', JSON.stringify(localData));
                resetForm();
                renderData(localData);
                return;
            }

            await saveData(payload);
            resetForm();
        });

        function renderData(data) {
            const list = document.getElementById('salesList');
            list.innerHTML = '';
            let tPaid = 0, tDebt = 0;

            if (!data || data.length === 0) {
                list.innerHTML = '<p class="text-center py-10 text-slate-400 italic text-xs">Database Kosong</p>';
            } else {
                data.forEach(item => {
                    const paid = (item.payments || []).reduce((a, b) => a + b.amount, 0);
                    const remain = item.price - paid;
                    tPaid += paid; tDebt += remain;

                    const card = document.createElement('div');
                    card.className = "p-4 bg-white border border-slate-100 rounded-2xl shadow-sm";
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div class="flex-grow">
                                <h3 class="font-bold text-slate-800 uppercase text-sm">${item.name}</h3>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">
                                    ${item.category} • ${item.size} ${item.is_long ? '• PJG' : ''}
                                </p>
                                ${item.phone || item.address ? `
                                    <div class="mt-2 text-[9px] text-slate-500 font-medium">
                                        ${item.phone ? `<p>📞 ${item.phone}</p>` : ''}
                                        ${item.address ? `<p>🏠 ${item.address}</p>` : ''}
                                    </div>
                                ` : ''}
                            </div>
                            <span class="text-[8px] px-2 py-0.5 rounded-full font-black uppercase ${remain <= 0 ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">
                                ${remain <= 0 ? 'Lunas' : 'Cicilan'}
                            </span>
                        </div>
                        <div class="mt-4 flex justify-between items-end">
                            <div>
                                <p class="text-[8px] text-slate-400 font-bold uppercase">Kekurangan</p>
                                <p class="font-black text-orange-600 text-sm">Rp ${remain.toLocaleString('id-ID')}</p>
                            </div>
                            <div class="flex gap-2">
                                ${currentUser.role === 'admin' ? `
                                    <button onclick="openPayModal('${item.id}')" class="px-3 py-1.5 bg-blue-600 text-white text-[9px] font-bold rounded-lg uppercase">Bayar</button>
                                    <button onclick="editItem('${item.id}')" class="px-3 py-1.5 bg-slate-100 text-slate-500 text-[9px] font-bold rounded-lg uppercase">Edit</button>
                                    <button onclick="deleteData('${item.id}')" class="px-3 py-1.5 text-red-400 hover:text-red-600">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            }

            document.getElementById('totalCollected').innerText = `Rp ${tPaid.toLocaleString('id-ID')}`;
            document.getElementById('totalReceivable').innerText = `Rp ${tDebt.toLocaleString('id-ID')}`;
        }

        async function editItem(id) {
            const item = supabaseClient ? (await supabaseClient.from('sales').select('*').eq('id', id).single()).data : localData.find(d => d.id == id);
            if (!item) return;

            document.getElementById('editId').value = item.id;
            document.getElementById('buyerName').value = item.name;
            document.getElementById('phoneNumber').value = item.phone || '';
            document.getElementById('address').value = item.address || '';
            document.getElementById('category').value = item.category;
            document.getElementById('longSleeve').checked = item.is_long;
            document.getElementById('formTitle').innerText = "Edit Pesanan";
            document.getElementById('submitBtn').innerText = "Simpan Perubahan";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            renderSizes(item.size);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('salesForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('formTitle').innerText = "Formulir Pemesanan";
            document.getElementById('submitBtn').innerText = "SIMPAN PESANAN";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            renderSizes();
        }

        async function openPayModal(id) {
            activeId = id;
            const data = supabaseClient ? (await fetchDataById(id)) : localData.find(d => d.id == id);
            const paid = (data.payments || []).reduce((a,b)=>a+b.amount, 0);
            const remain = data.price - paid;
            
            if (remain <= 0) { alert("Sudah Lunas!"); return; }

            document.getElementById('modalName').innerText = data.name;
            document.getElementById('modalSisa').innerText = `Sisa: Rp ${remain.toLocaleString('id-ID')}`;
            document.getElementById('payAmount').value = remain;
            document.getElementById('paymentModal').classList.remove('hidden');
        }

        async function savePayment() {
            const amt = parseInt(document.getElementById('payAmount').value);
            if (!amt || amt <= 0) return;

            const item = supabaseClient ? (await fetchDataById(activeId)) : localData.find(d => d.id == activeId);
            const payments = item.payments || [];
            payments.push({ amount: amt, date: new Date().toISOString() });

            if (supabaseClient) {
                await supabaseClient.from('sales').update({ payments }).eq('id', activeId);
            } else {
                item.payments = payments;
                localStorage.setItem('offline_sales', JSON.stringify(localData));
            }

            closeModal();
            fetchData();
        }

        async function fetchDataById(id) {
            const { data } = await supabaseClient.from('sales').select('*').eq('id', id).single();
            return data;
        }

        function closeModal() { document.getElementById('paymentModal').classList.add('hidden'); }

        document.getElementById('category').onchange = () => renderSizes();
        document.getElementById('paymentStatus').onchange = (e) => {
            document.getElementById('installmentInput').classList.toggle('hidden', e.target.value !== 'cicilan');
        };

        window.onload = initApp;
    </script>
</body>
</html>
